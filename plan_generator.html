<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan Sanitario — Calendario</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --verde: #1a7a55;
  --verde-claro: #e8f5ef;
  --verde-oscuro: #0d5238;
  --tierra: #8b6914;
  --tierra-claro: #fdf3e0;
  --rojo: #c0392b;
  --rojo-claro: #fdf0ee;
  --azul: #1a5fa8;
  --azul-claro: #e8f0fb;
  --violeta: #6b3fa0;
  --violeta-claro: #f0eafa;
  --naranja: #c05c1a;
  --naranja-claro: #fdf0e8;
  --gris: #5a5a5a;
  --gris-claro: #f5f4f1;
  --borde: #d8d4cc;
  --texto: #1c1c1a;
  --blanco: #fefefe;
  --sombra: 0 2px 12px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #f0ede6;
  min-height: 100vh;
  color: var(--texto);
  padding: 2rem 1rem 4rem;
}
.container { max-width: 860px; margin: 0 auto; }

/* HEADER */
.header { text-align: center; margin-bottom: 2rem; }
.logo-icon {
  width: 60px; height: 60px; background: var(--verde);
  border-radius: 50%; display: flex; align-items: center;
  justify-content: center; margin: 0 auto 0.75rem;
  box-shadow: 0 4px 20px rgba(26,122,85,0.3);
}
.logo-nombre { font-family: 'Lora', serif; font-size: 20px; font-weight: 600; color: var(--verde-oscuro); }
.logo-sub { font-size: 13px; color: var(--gris); margin-top: 2px; }

/* PRODUCTOR INFO */
.productor-card {
  background: var(--blanco); border-radius: 14px;
  border: 0.5px solid var(--borde); padding: 1.25rem 1.5rem;
  margin-bottom: 1.5rem; box-shadow: var(--sombra);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 1rem;
}
.productor-info h2 { font-family: 'Lora', serif; font-size: 18px; font-weight: 500; color: var(--texto); }
.productor-info p { font-size: 13px; color: var(--gris); margin-top: 2px; }
.btn-pdf {
  display: flex; align-items: center; gap: 8px;
  background: var(--verde); color: white; border: none;
  border-radius: 10px; padding: 10px 20px; font-size: 14px;
  font-family: 'DM Sans', sans-serif; font-weight: 500;
  cursor: pointer; transition: background 0.2s, transform 0.15s;
  white-space: nowrap;
}
.btn-pdf:hover { background: var(--verde-oscuro); transform: translateY(-1px); }
.btn-pdf svg { width: 16px; height: 16px; }

/* TABS */
.tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; }
.tab {
  padding: 8px 20px; border-radius: 8px; border: 1px solid var(--borde);
  background: var(--blanco); font-size: 13.5px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; color: var(--gris);
  transition: all 0.18s;
}
.tab.active { background: var(--verde); color: white; border-color: var(--verde); font-weight: 500; }

/* LEYENDA */
.leyenda {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-bottom: 1.25rem;
}
.leyenda-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--gris);
}
.leyenda-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* VISTA ANUAL */
.anual-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}
.mes-card {
  background: var(--blanco); border-radius: 12px;
  border: 0.5px solid var(--borde); padding: 1rem;
  box-shadow: var(--sombra);
}
.mes-nombre {
  font-family: 'Lora', serif; font-size: 14px; font-weight: 600;
  color: var(--verde-oscuro); margin-bottom: 0.6rem;
  padding-bottom: 0.5rem; border-bottom: 0.5px solid var(--borde);
}
.mes-vacio { font-size: 12px; color: #bbb; font-style: italic; }
.evento-pill {
  display: flex; align-items: flex-start; gap: 6px;
  margin-bottom: 5px;
}
.evento-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.evento-texto { font-size: 11.5px; color: var(--texto); line-height: 1.4; }
.evento-fecha { font-size: 10px; color: var(--gris); display: block; }

/* VISTA MENSUAL */
.mensual-wrap { display: none; }
.mes-detalle {
  background: var(--blanco); border-radius: 14px;
  border: 0.5px solid var(--borde); padding: 1.5rem;
  margin-bottom: 1rem; box-shadow: var(--sombra);
}
.mes-detalle-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 1rem; padding-bottom: 0.75rem;
  border-bottom: 0.5px solid var(--borde);
}
.mes-num {
  width: 36px; height: 36px; background: var(--verde-claro);
  border-radius: 8px; display: flex; align-items: center;
  justify-content: center; font-weight: 600; font-size: 14px;
  color: var(--verde-oscuro); flex-shrink: 0;
}
.mes-detalle-nombre { font-family: 'Lora', serif; font-size: 17px; font-weight: 500; }
.evento-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 10px 0; border-bottom: 0.5px solid var(--gris-claro);
}
.evento-row:last-child { border-bottom: none; padding-bottom: 0; }
.evento-cat-dot {
  width: 12px; height: 12px; border-radius: 50%;
  flex-shrink: 0; margin-top: 3px;
}
.evento-det { flex: 1; }
.evento-det strong { font-size: 13.5px; font-weight: 500; display: block; color: var(--texto); }
.evento-det span { font-size: 12px; color: var(--gris); line-height: 1.5; display: block; margin-top: 2px; }
.evento-det .fecha-tag {
  display: inline-block; background: var(--gris-claro);
  border-radius: 4px; padding: 1px 7px; font-size: 11px;
  color: var(--gris); margin-top: 4px;
}

/* CATEGORIAS */
.cat-vacunacion { background: #1a5fa8; }
.cat-endo { background: #6b3fa0; }
.cat-ecto { background: #c05c1a; }
.cat-manejo { background: #1a7a55; }
.cat-veterinario { background: #c0392b; }

/* NO EVENTOS */
.no-eventos { font-size: 13px; color: #bbb; font-style: italic; padding: 0.5rem 0; }

.mes-pasado { opacity: 0.65; }

/* LOADING */
.loading {
  text-align: center; padding: 4rem 2rem;
  background: var(--blanco); border-radius: 14px;
  border: 0.5px solid var(--borde);
}
.loading p { color: var(--gris); font-size: 14px; margin-top: 1rem; }

/* MOBILE */
@media (max-width: 600px) {
  .anual-grid { grid-template-columns: 1fr 1fr; }
  .productor-card { flex-direction: column; }
  .tabs { overflow-x: auto; }
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <img src="logo.jpeg" alt="Más Fértil" style="width:140px;height:auto;display:block;margin:0 auto 0.5rem;mix-blend-mode:multiply;" onerror="this.style.display='none';" />
    <div class="logo-nombre">Plan Sanitario Ganadero</div>
    <div class="logo-sub">Calendario de actividades personalizado</div>
  </div>

  <!-- PANEL AFTOSA -->
  <div id="aftosaPanel" style="background:white;border-radius:14px;border:0.5px solid #d8d4cc;padding:1.25rem 1.5rem;margin-bottom:1.25rem;box-shadow:0 2px 12px rgba(0,0,0,0.08);">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:0.5px solid #d8d4cc;">
      <div style="width:36px;height:36px;border-radius:10px;background:#e8f0fb;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a5fa8" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <div>
        <div style="font-family:'Lora',serif;font-size:15px;font-weight:500;">Fechas Fiebre Aftosa</div>
        <div style="font-size:12px;color:#5a5a5a;">Ingresá las fechas de campaña del año (MGAP/SENASA)</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div>
        <label style="display:block;font-size:12px;color:#5a5a5a;margin-bottom:4px;font-weight:500;">1ª campaña</label>
        <input type="date" id="aftosaInput1" style="width:100%;height:40px;border:1px solid #d8d4cc;border-radius:10px;padding:0 12px;font-size:13px;" onchange="actualizarAftosa()" />
      </div>
      <div>
        <label style="display:block;font-size:12px;color:#5a5a5a;margin-bottom:4px;font-weight:500;">2ª campaña</label>
        <input type="date" id="aftosaInput2" style="width:100%;height:40px;border:1px solid #d8d4cc;border-radius:10px;padding:0 12px;font-size:13px;" onchange="actualizarAftosa()" />
      </div>
    </div>
  </div>

  <div id="mainContent">
    <div class="loading">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#1a7a55" stroke-width="2">
        <circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-dashoffset="32">
          <animate attributeName="stroke-dashoffset" values="32;0" dur="1s" repeatCount="indefinite"/>
        </circle>
      </svg>
      <p>Calculando tu plan sanitario...</p>
    </div>
  </div>

</div>

<script>
const { jsPDF } = window.jspdf;

// ======================================================
// COLORES POR CATEGORÍA
// ======================================================
const COLORES = {
  vacunacion:   { hex: '#1a5fa8', claro: '#e8f0fb', nombre: 'Vacunaciones' },
  endo:         { hex: '#6b3fa0', claro: '#f0eafa', nombre: 'Endoparásitos' },
  ecto:         { hex: '#c05c1a', claro: '#fdf0e8', nombre: 'Ectoparásitos' },
  manejo:       { hex: '#1a7a55', claro: '#e8f5ef', nombre: 'Manejo' },
  veterinario:  { hex: '#c0392b', claro: '#fdf0ee', nombre: 'Trabajos veterinarios' }
};

const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
               'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// ======================================================
// LEER PARÁMETROS DE LA URL
// ======================================================
function getParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    nombre:           p.get('nombre') || 'Productor',
    establecimiento:  p.get('establecimiento') || 'Establecimiento',
    ubicacion:        p.get('ubicacion') || '',
    paraje:           p.get('paraje') || '',
    celular:          p.get('celular') || '',
    fin_partos:       p.get('fin_partos') || '',
    inicio_servicios: p.get('inicio_servicios') || '',
    fin_servicios:    p.get('fin_servicios') || '',
    brucelosis:       p.get('brucelosis') || 'no',
    neospora:         p.get('neospora') || 'no',
    garrapatas:       p.get('garrapatas') || 'no',
    tristeza:         p.get('tristeza') || 'no',
    carbunco:         p.get('carbunco') || 'no',
    paramphistomum:   p.get('paramphistomum') || 'no',
    saguaype:         p.get('saguaype') || 'no',
    mosca:            p.get('mosca') || 'no',
    aftosa1:          p.get('aftosa1') || '',
    aftosa2:          p.get('aftosa2') || ''
  };
}

// ======================================================
// UTILIDADES DE FECHA
// ======================================================
function parseDate(str) {
  if (!str) return null;
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function addDays(date, days) {
  const d = new Date(date);
  d.setDate(d.getDate() + days);
  return d;
}

function formatDate(date) {
  if (!date) return '';
  return date.toLocaleDateString('es-UY', { day: 'numeric', month: 'short' });
}

function mesAnio(date) {
  if (!date) return null;
  return { mes: date.getMonth(), anio: date.getFullYear() };
}

// Obtener fecha de un mes en el año actual o siguiente si ya pasó más de 6 meses
function proximoMes(mesIdx) {
  const hoy = new Date();
  let anio = hoy.getFullYear();
  // Si el mes ya pasó hace más de 1 mes, usar el año siguiente
  if (mesIdx < hoy.getMonth() - 1) anio++;
  return new Date(anio, mesIdx, 1);
}

// ======================================================
// MOTOR DE CÁLCULO DEL PLAN SANITARIO
// ======================================================
function calcularPlan(p) {
  const eventos = []; // { fecha, titulo, descripcion, categoria, mesajes? }

  const finPartos       = parseDate(p.fin_partos);
  const finServicios    = parseDate(p.fin_servicios);
  const inicioServicios = parseDate(p.inicio_servicios);

  // -------- 1. ENFERMEDADES CLOSTRIDIALES --------
  if (finPartos) {
    const vac1 = addDays(finPartos, 90);
    const vac2 = addDays(finPartos, 120);
    let descClost = 'Vacunar terneros/as contra enfermedades clostridiales. Revacunar a los 20-30 días para buena inmunidad previo al destete/castración. Animales vacunados el año pasado solo necesitan una dosis.';
    if (p.brucelosis === 'si') descClost += ' También es buen momento de vacunar a las terneras contra brucelosis.';
    eventos.push({ fecha: vac1, titulo: 'Vacunación clostridial — 1ª dosis (terneros/as)', descripcion: descClost, categoria: 'vacunacion' });
    eventos.push({ fecha: vac2, titulo: 'Revacunación clostridial (terneros/as)', descripcion: 'Revacunación de terneros/as contra clostridios. Es fundamental que categorías menores de 2 años estén desparasitadas.', categoria: 'vacunacion' });

    // -------- 1b. VACUNA RESPIRATORIA --------
    eventos.push({ fecha: vac1, titulo: 'Vacunación respiratoria — 1ª dosis (terneros/as)', descripcion: 'Vacunar terneros/as contra enfermedades respiratorias (IBR, DVB, PI3, BRSV). Primera dosis. Revacunar a los 20-30 días.', categoria: 'vacunacion' });
    eventos.push({ fecha: vac2, titulo: 'Revacunación respiratoria (terneros/as)', descripcion: 'Segunda dosis de vacuna respiratoria para completar inmunización previo al destete.', categoria: 'vacunacion' });

    // -------- 1c. VACUNA QUERATOCONJUNTIVITIS --------
    eventos.push({ fecha: vac1, titulo: 'Vacunación contra Queratoconjuntivitis (terneros/as)', descripcion: 'Vacunar terneros/as contra queratoconjuntivitis infecciosa bovina (Moraxella bovis). Aplicar junto con las otras vacunas del destete.', categoria: 'vacunacion' });
  }

  // -------- 2. LEPTOSPIROSIS Y ECOGRAFÍA --------
  if (finServicios) {
    const fecha = addDays(finServicios, 45);
    eventos.push({
      fecha,
      titulo: 'Vacunación contra Leptospirosis + Diagnóstico ecográfico',
      descripcion: 'Realizar diagnóstico por ecografía de vientres en servicio y vacunación de hembras preñadas para evitar abortos.',
      categoria: 'veterinario'
    });
  }

  // -------- 3. VACUNA REPRODUCTIVA PRE-SERVICIOS Y EVALUACIÓN DE TOROS --------
  if (inicioServicios) {
    // Evaluación anatómica y funcional de toros: 80 días antes
    eventos.push({
      fecha: addDays(inicioServicios, -80),
      titulo: 'Evaluación anatómica y funcional de Toros',
      descripcion: 'Realizar evaluación completa de aptitud reproductiva de los toros: condición corporal, aparato reproductor, capacidad de monta y calidad seminal. Hacerlo con tiempo suficiente para reemplazar toros si es necesario.',
      categoria: 'veterinario'
    });
    // Vacuna reproductiva vaquillonas: 1ª dosis, 60 días antes
    eventos.push({
      fecha: addDays(inicioServicios, -60),
      titulo: 'Vacuna reproductiva vaquillonas — 1ª dosis',
      descripcion: 'Primera dosis de vacuna reproductiva para vaquillonas que ingresan al servicio. Se requieren 2 dosis para lograr inmunidad adecuada y evitar pérdidas embrionarias y abortos.',
      categoria: 'vacunacion'
    });
    // Vacuna reproductiva vaquillonas 2ª dosis + vacas: 30 días antes
    eventos.push({
      fecha: addDays(inicioServicios, -30),
      titulo: 'Vacuna reproductiva vaquillonas — 2ª dosis + Revacunación vacas',
      descripcion: 'Segunda dosis de vacuna reproductiva para vaquillonas. Las vacas vacunadas el año anterior reciben una única dosis de revacunación anual 30 días antes del servicio. Categorías menores de 2 años deben estar desparasitadas.',
      categoria: 'vacunacion'
    });
  }

  // -------- 4. CARBUNCO --------
  if (p.carbunco === 'si') {
    const fecha = proximoMes(8); // Septiembre
    eventos.push({
      fecha,
      titulo: 'Vacunación contra Carbunco (Ántrax)',
      descripcion: 'Con la primavera llega el riesgo. Las esporas de carbunco se encuentran en el suelo. Vacunar antes del verano cuando los animales comen contra el suelo.',
      categoria: 'vacunacion'
    });
  }

  // -------- 5. MOSCA DE CUERNOS --------
  if (p.mosca === 'si') {
    const fecha = proximoMes(11); // Diciembre
    eventos.push({
      fecha,
      titulo: 'Control de Mosca de cuernos',
      descripcion: 'La mosca del cuerno provoca pérdidas de 10 a 30 kg de carne por animal por año. Aplicar las medidas preventivas correspondientes.',
      categoria: 'ecto'
    });
  }

  // -------- 6. SAGUAYPÉ --------
  if (p.saguaype === 'si') {
    eventos.push({
      fecha: proximoMes(3), // Abril
      titulo: 'Dosificación contra Saguaypé (Fasciola hepatica)',
      descripcion: 'Dosificar al ganado contra saguaypé / distomatosis hepática.',
      categoria: 'endo'
    });
    eventos.push({
      fecha: proximoMes(8), // Septiembre
      titulo: 'Dosificación contra Saguaypé (Fasciola hepatica)',
      descripcion: 'Segunda dosificación anual contra saguaypé.',
      categoria: 'endo'
    });
  }

  // -------- 7. PARAMPHISTOMUM --------
  if (p.paramphistomum === 'si') {
    eventos.push({
      fecha: proximoMes(2), // Marzo
      titulo: 'Tratamiento contra Paramphistomum',
      descripcion: 'Trematode ruminal. Tratar animales afectados, especialmente en zonas con bañados y aguadas.',
      categoria: 'endo'
    });
    eventos.push({
      fecha: proximoMes(8), // Septiembre
      titulo: 'Tratamiento contra Paramphistomum',
      descripcion: 'Segunda aplicación anual. Controlar especialmente animales jóvenes.',
      categoria: 'endo'
    });
  }

  // -------- 8. GARRAPATAS --------
  if (p.garrapatas === 'si') {
    // Primera generación: agosto, septiembre, octubre
    [7, 8, 9].forEach(m => {
      eventos.push({
        fecha: proximoMes(m),
        titulo: 'Control garrapatas — 1ª generación (familia 1)',
        descripcion: 'Tratar contra primera generación de garrapatas con una familia 1 de garrapaticidas. Consulte a su veterinario para seleccionar el producto adecuado y respetar los tiempos de carencia.',
        categoria: 'ecto'
      });
    });
    // Segunda generación: noviembre, diciembre, enero
    [10, 11, 0].forEach(m => {
      eventos.push({
        fecha: proximoMes(m),
        titulo: 'Control garrapatas — 2ª generación (familia 2)',
        descripcion: 'Tratar contra segunda generación de garrapatas con una familia 2 de garrapaticidas. Rotar familia de garrapaticidas para evitar resistencia. Consulte a su veterinario.',
        categoria: 'ecto'
      });
    });
    // Tercera generación: febrero, marzo, abril, mayo
    [1, 2, 3, 4].forEach(m => {
      eventos.push({
        fecha: proximoMes(m),
        titulo: 'Control garrapatas — 3ª generación (familia 3)',
        descripcion: 'Tratar contra tercera generación de garrapatas con una familia 3 de garrapaticidas. Rotar familia de garrapaticidas para evitar resistencia. Consulte a su veterinario.',
        categoria: 'ecto'
      });
    });
  }

  // -------- 9. TRISTEZA BOVINA --------
  if (p.tristeza === 'si' && finPartos) {
    const vac1Tristeza = addDays(finPartos, 90);
    const vac2Tristeza = addDays(vac1Tristeza, 60);
    eventos.push({
      fecha: vac1Tristeza,
      titulo: 'Vacunación contra Tristeza bovina (terneros/as)',
      descripcion: 'Vacunación contra Tristeza (Babesiosis/Anaplasmosis) de terneros/as mayores a los 3 meses. Aplicar en zona con presencia de garrapatas portadoras.',
      categoria: 'vacunacion'
    });
    eventos.push({
      fecha: vac2Tristeza,
      titulo: 'Revacunación contra Tristeza bovina (terneros/as)',
      descripcion: 'Revacunación contra Tristeza de terneros/as, 60 días después de la primera dosis para completar la inmunización.',
      categoria: 'vacunacion'
    });
  }

  // -------- 10. PARÁSITOS GASTROINTESTINALES (<2 años) --------
  const mesesParasitos = [0, 2, 4, 6, 8, 10]; // Ene, Mar, May, Jul, Sep, Nov
  mesesParasitos.forEach(m => {
    eventos.push({
      fecha: proximoMes(m),
      titulo: 'Control parásitos gastrointestinales (menores 2 años)',
      descripcion: 'Bovinos menores de 2 años son muy susceptibles. Realizar análisis coprológico o dosificar según resultado.',
      categoria: 'endo'
    });
  });

  // -------- 11. FIEBRE AFTOSA --------
  if (p.aftosa1) {
    eventos.push({
      fecha: parseDate(p.aftosa1),
      titulo: 'Vacunación Fiebre Aftosa — 1ª campaña',
      descripcion: 'Vacunación obligatoria contra Fiebre Aftosa según calendario MGAP/SENASA. Todos los bovinos.',
      categoria: 'vacunacion'
    });
  } else {
    eventos.push({
      fecha: null,
      titulo: 'Fiebre Aftosa — 1ª campaña (fecha pendiente)',
      descripcion: 'Fecha determinada por MGAP/SENASA. Consultar calendario oficial de vacunación.',
      categoria: 'vacunacion',
      sinFecha: true
    });
  }
  if (p.aftosa2) {
    eventos.push({
      fecha: parseDate(p.aftosa2),
      titulo: 'Vacunación Fiebre Aftosa — 2ª campaña',
      descripcion: 'Segunda campaña obligatoria contra Fiebre Aftosa según calendario MGAP/SENASA. Todos los bovinos.',
      categoria: 'vacunacion'
    });
  } else {
    eventos.push({
      fecha: null,
      titulo: 'Fiebre Aftosa — 2ª campaña (fecha pendiente)',
      descripcion: 'Fecha determinada por MGAP/SENASA. Consultar calendario oficial de vacunación.',
      categoria: 'vacunacion',
      sinFecha: true
    });
  }

  return eventos.filter(e => e.fecha || e.sinFecha);
}

// ======================================================
// AGRUPAR EVENTOS POR MES
// ======================================================
function agruparPorMes(eventos) {
  const hoy = new Date();
  const mapa = {};

  // Agregar todos los eventos al mapa sin restricción de fechas
  eventos.forEach(ev => {
    if (ev.sinFecha) {
      const key = `${hoy.getFullYear()}-${String(hoy.getMonth()).padStart(2,'0')}`;
      if (!mapa[key]) mapa[key] = { mes: hoy.getMonth(), anio: hoy.getFullYear(), eventos: [] };
      mapa[key].eventos.push(ev);
      return;
    }
    const key = `${ev.fecha.getFullYear()}-${String(ev.fecha.getMonth()).padStart(2,'0')}`;
    if (!mapa[key]) mapa[key] = { mes: ev.fecha.getMonth(), anio: ev.fecha.getFullYear(), eventos: [] };
    mapa[key].eventos.push(ev);
  });

  // Ordenar cronológicamente
  return Object.values(mapa).sort((a, b) => {
    if (a.anio !== b.anio) return a.anio - b.anio;
    return a.mes - b.mes;
  });
}

// ======================================================
// RENDER HTML
// ======================================================
function render(p, eventos, porMes) {
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="productor-card">
      <div class="productor-info">
        <h2>${p.nombre}</h2>
        <p>${p.establecimiento}${p.ubicacion ? ' · ' + p.ubicacion : ''}</p>
      </div>
      <button class="btn-pdf" onclick="generarPDF()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Descargar PDF
      </button>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('anual', this)">Vista anual</button>
      <button class="tab" onclick="switchTab('mensual', this)">Mes a mes</button>
    </div>

    <div class="leyenda">
      ${Object.entries(COLORES).map(([k,v]) => `
        <div class="leyenda-item">
          <div class="leyenda-dot" style="background:${v.hex}"></div>
          <span>${v.nombre}</span>
        </div>
      `).join('')}
    </div>

    <div id="vistaAnual" class="anual-grid">
      ${porMes.map(m => {
        const hoy = new Date();
        const esPasado = (m.anio < hoy.getFullYear()) || (m.anio === hoy.getFullYear() && m.mes < hoy.getMonth());
        return `
        <div class="mes-card${esPasado ? ' mes-pasado' : ''}">
          <div class="mes-nombre">${MESES[m.mes]} ${m.anio}${esPasado ? ' <span style="font-size:9px;color:#aaa;font-weight:400;">(realizado)</span>' : ''}</div>
          ${m.eventos.length === 0
            ? '<div class="mes-vacio">Sin actividades</div>'
            : m.eventos.map(ev => `
              <div class="evento-pill">
                <div class="evento-dot" style="background:${esPasado ? '#bbb' : COLORES[ev.categoria].hex}"></div>
                <div class="evento-texto" style="${esPasado ? 'color:#aaa;' : ''}">
                  ${ev.titulo}
                  ${ev.fecha ? `<span class="evento-fecha">${formatDate(ev.fecha)}</span>` : ''}
                </div>
              </div>
            `).join('')
          }
        </div>`;
      }).join('')}
    </div>

    <div id="vistaMensual" class="mensual-wrap">
      ${porMes.map((m, idx) => {
        const hoy = new Date();
        const esPasado = (m.anio < hoy.getFullYear()) || (m.anio === hoy.getFullYear() && m.mes < hoy.getMonth());
        return `
        <div class="mes-detalle${esPasado ? ' mes-pasado' : ''}">
          <div class="mes-detalle-header">
            <div class="mes-num" style="${esPasado ? 'background:#f0f0f0;color:#aaa;' : ''}">${String(idx + 1).padStart(2,'0')}</div>
            <div class="mes-detalle-nombre">${MESES[m.mes]} ${m.anio}${esPasado ? ' <span style="font-size:11px;color:#aaa;font-weight:400;">— ya realizado</span>' : ''}</div>
          </div>
          ${m.eventos.length === 0
            ? '<div class="no-eventos">Sin actividades programadas este mes.</div>'
            : m.eventos.map(ev => `
              <div class="evento-row" style="${esPasado ? 'opacity:0.5;' : ''}">
                <div class="evento-cat-dot" style="background:${esPasado ? '#bbb' : COLORES[ev.categoria].hex}"></div>
                <div class="evento-det">
                  <strong>${ev.titulo}</strong>
                  <span>${ev.descripcion}</span>
                  ${ev.fecha ? `<span class="fecha-tag">${formatDate(ev.fecha)}</span>` : '<span class="fecha-tag">Fecha según autoridad sanitaria</span>'}
                </div>
              </div>
            `).join('')
          }
        </div>`;
      }).join('')}
    </div>
  `;
}

function switchTab(vista, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('vistaAnual').style.display = vista === 'anual' ? '' : 'none';
  document.getElementById('vistaMensual').style.display = vista === 'mensual' ? 'block' : 'none';
}

// ======================================================
// GENERAR PDF
// ======================================================
window.generarPDF = function() {
  const p = getParams();
  const eventos = calcularPlan(p);
  const porMes = agruparPorMes(eventos);

  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const W = 210, mg = 15;
  let y = 0;

  function nuevaPagina() {
    doc.addPage();
    y = mg;
    // Header pequeño en cada página
    doc.setFillColor(26, 122, 85);
    doc.rect(0, 0, W, 10, 'F');
    doc.setFontSize(8);
    doc.setTextColor(255, 255, 255);
    doc.text('Plan Sanitario Ganadero — ' + p.nombre + ' — ' + p.establecimiento, mg, 7);
    y = 18;
  }

  function checkPage(needed) {
    if (y + needed > 275) nuevaPagina();
  }

  // ---- PORTADA ----
  doc.setFillColor(26, 122, 85);
  doc.rect(0, 0, W, 60, 'F');

  // Logo real desde imagen en la página
  try {
    const logoImg = document.querySelector('img[src="logo.jpeg"]');
    if (logoImg && logoImg.complete) {
      const canvas = document.createElement('canvas');
      canvas.width = logoImg.naturalWidth;
      canvas.height = logoImg.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(logoImg, 0, 0);
      const logoData = canvas.toDataURL('image/jpeg');
      const logoW = 60;
      const logoH = (logoImg.naturalHeight / logoImg.naturalWidth) * logoW;
      doc.addImage(logoData, 'JPEG', W/2 - logoW/2, 70, logoW, logoH);
      y = 70 + logoH + 8;
    } else {
      y = 70;
    }
  } catch(e) {
    y = 70;
  }

  doc.setFontSize(20);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(13, 82, 56);
  doc.text('Plan Sanitario Ganadero', W/2, y + 10, { align: 'center' });

  doc.setFontSize(12);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(90, 90, 90);
  doc.text('Calendario Personalizado de Actividades', W/2, y + 20, { align: 'center' });

  // Info del productor
  doc.setFillColor(232, 245, 239);
  doc.roundedRect(mg, y + 28, W - mg*2, 50, 4, 4, 'F');
  doc.setFontSize(10);
  doc.setTextColor(26, 122, 85);
  doc.setFont('helvetica', 'bold');
  doc.text('PRODUCTOR', mg + 8, y + 40);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(28, 28, 26);
  doc.setFontSize(13);
  doc.text(p.nombre, mg + 8, y + 50);
  doc.setFontSize(10);
  doc.setTextColor(90, 90, 90);
  doc.text(p.establecimiento + (p.ubicacion ? '  ·  ' + p.ubicacion : '') + (p.paraje ? '  ·  ' + p.paraje : ''), mg + 8, y + 58);
  doc.text('Cel: ' + p.celular, mg + 8, y + 66);

  // Leyenda portada
  y = y + 90;
  doc.setFontSize(9);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(28, 28, 26);
  doc.text('CATEGORÍAS', mg, y);
  y += 6;
  const cats = Object.values(COLORES);
  cats.forEach((c, i) => {
    const x = mg + (i % 2) * 90;
    if (i % 2 === 0 && i > 0) y += 7;
    const rgb = hexToRgb(c.hex);
    doc.setFillColor(rgb.r, rgb.g, rgb.b);
    doc.circle(x + 3, y - 1.5, 3, 'F');
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(28, 28, 26);
    doc.text(c.nombre, x + 8, y);
  });

  // Fecha generación
  y = 270;
  doc.setFontSize(8);
  doc.setTextColor(150, 150, 150);
  doc.text('Generado: ' + new Date().toLocaleDateString('es-UY'), mg, y);
  doc.text('Página 1 de ' + (porMes.length + 1), W - mg, y, { align: 'right' });

  // ---- PÁGINAS DE CONTENIDO ----
  nuevaPagina();

  // Título vista anual
  doc.setFontSize(14);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(13, 82, 56);
  doc.text('Resumen Anual de Actividades', mg, y);
  y += 10;

  // Tabla resumen: mes | actividades
  const colW = [35, W - mg*2 - 35];
  const rowH = 7;

  // Cabecera tabla
  doc.setFillColor(26, 122, 85);
  doc.rect(mg, y, W - mg*2, 8, 'F');
  doc.setFontSize(9);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(255, 255, 255);
  doc.text('MES', mg + 3, y + 5.5);
  doc.text('ACTIVIDADES PROGRAMADAS', mg + colW[0] + 3, y + 5.5);
  y += 8;

  porMes.forEach((m, idx) => {
    const lines = m.eventos.length === 0
      ? ['Sin actividades']
      : m.eventos.map(e => '• ' + e.titulo);

    const lineH = 5;
    const blockH = Math.max(lines.length * lineH + 4, 10);
    checkPage(blockH + 2);

    // Fondo alternado
    if (idx % 2 === 0) {
      doc.setFillColor(248, 248, 246);
      doc.rect(mg, y, W - mg*2, blockH, 'F');
    }

    // Borde
    doc.setDrawColor(216, 212, 204);
    doc.rect(mg, y, W - mg*2, blockH);
    doc.line(mg + colW[0], y, mg + colW[0], y + blockH);

    // Mes
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(13, 82, 56);
    doc.text(MESES[m.mes].substring(0,3).toUpperCase(), mg + 3, y + blockH/2 + 1.5);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(90, 90, 90);
    doc.text(String(m.anio), mg + 3, y + blockH/2 + 6.5);

    // Actividades
    doc.setFontSize(8);
    doc.setFont('helvetica', 'normal');
    lines.forEach((line, li) => {
      const ev = m.eventos[li];
      if (ev) {
        const rgb = hexToRgb(COLORES[ev.categoria].hex);
        doc.setTextColor(rgb.r, rgb.g, rgb.b);
      } else {
        doc.setTextColor(180, 180, 180);
      }
      const truncated = line.length > 70 ? line.substring(0, 68) + '...' : line;
      doc.text(truncated, mg + colW[0] + 3, y + 2 + lineH * (li + 0.8));
    });

    y += blockH;
  });

  // ---- PÁGINAS MES A MES DETALLADO ----
  porMes.forEach(m => {
    nuevaPagina();

    // Header del mes
    doc.setFillColor(232, 245, 239);
    doc.rect(mg, y - 4, W - mg*2, 14, 'F');
    doc.setFontSize(14);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(13, 82, 56);
    doc.text(MESES[m.mes] + ' ' + m.anio, mg + 4, y + 5);
    y += 16;

    if (m.eventos.length === 0) {
      doc.setFontSize(10);
      doc.setFont('helvetica', 'italic');
      doc.setTextColor(180, 180, 180);
      doc.text('Sin actividades programadas para este mes.', mg, y);
      return;
    }

    m.eventos.forEach(ev => {
      const rgb = hexToRgb(COLORES[ev.categoria].hex);
      const rgbClaro = hexToRgb(COLORES[ev.categoria].claro);

      // Calcular altura del bloque
      const descLines = doc.splitTextToSize(ev.descripcion, W - mg*2 - 20);
      const blockH = 8 + descLines.length * 4.5 + 8;
      checkPage(blockH + 4);

      // Fondo
      doc.setFillColor(rgbClaro.r, rgbClaro.g, rgbClaro.b);
      doc.roundedRect(mg, y, W - mg*2, blockH, 3, 3, 'F');

      // Borde izquierdo de color
      doc.setFillColor(rgb.r, rgb.g, rgb.b);
      doc.rect(mg, y, 4, blockH, 'F');

      // Categoría
      doc.setFontSize(7.5);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(rgb.r, rgb.g, rgb.b);
      doc.text(COLORES[ev.categoria].nombre.toUpperCase(), mg + 8, y + 6);

      // Título
      doc.setFontSize(10);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(28, 28, 26);
      doc.text(ev.titulo, mg + 8, y + 12);

      // Descripción
      doc.setFontSize(8.5);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(90, 90, 90);
      doc.text(descLines, mg + 8, y + 18);

      // Fecha
      if (ev.fecha) {
        doc.setFontSize(8);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(rgb.r, rgb.g, rgb.b);
        doc.text('Fecha estimada: ' + formatDate(ev.fecha), mg + 8, y + blockH - 4);
      }

      y += blockH + 4;
    });
  });

  // ---- PIE DE PÁGINA en todas las páginas ----
  const totalPages = doc.getNumberOfPages();
  for (let i = 1; i <= totalPages; i++) {
    doc.setPage(i);
    doc.setFontSize(7.5);
    doc.setTextColor(180, 180, 180);
    doc.text('Página ' + i + ' de ' + totalPages, W - mg, 290, { align: 'right' });
    if (i > 1) {
      doc.text('Plan Sanitario Ganadero · ' + p.nombre + ' · ' + p.establecimiento, mg, 290);
    }
  }

  doc.save('Plan_Sanitario_' + p.nombre.replace(/ /g, '_') + '.pdf');
};

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return { r, g, b };
}

// ======================================================
// ACTUALIZAR AFTOSA
// ======================================================
function actualizarAftosa() {
  const p = getParams();
  p.aftosa1 = document.getElementById('aftosaInput1').value;
  p.aftosa2 = document.getElementById('aftosaInput2').value;
  const eventos = calcularPlan(p);
  const porMes = agruparPorMes(eventos);
  render(p, eventos, porMes);
}

// INIT
// ======================================================
window.addEventListener('load', () => {
  const p = getParams();

  if (p.aftosa1) document.getElementById('aftosaInput1').value = p.aftosa1;
  if (p.aftosa2) document.getElementById('aftosaInput2').value = p.aftosa2;
  const eventos = calcularPlan(p);
  const porMes = agruparPorMes(eventos);
  render(p, eventos, porMes);
});
